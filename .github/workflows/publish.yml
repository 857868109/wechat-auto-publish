name: 每日自动发布公众号

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行程序生成报告
        run: python valuation_wechat.py

      - name: 安装发布工具
        run: npm install -g @wenyan-md/cli

      - name: 调试 - 检查环境变量
        run: |
          echo "WECHAT_APP_ID is set: ${{ secrets.WECHAT_APP_ID != '' }}"
          echo "WECHAT_APP_SECRET is set: ${{ secrets.WECHAT_APP_SECRET != '' }}"

      - name: 调试 - 测试 wenyan 配置
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
        run: wenyan config --list

      - name: 发布到公众号草稿箱
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
        run: wenyan publish -f output.md
