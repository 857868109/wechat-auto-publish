name: 每日自动发布公众号

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 运行程序生成报告
        run: python valuation_wechat.py
      
      - name: 安装发布工具
        run: npm install -g @wenyan-md/cli
      
      - name: 发布到公众号草稿箱
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
        run: wenyan publish -f output.md